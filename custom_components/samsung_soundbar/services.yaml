dump_execute_payload:
  name: Dump execute payload
  description: Request SmartThings execute hrefs and return the raw payload for diagnostics.
  fields:
    device_id:
      name: Device
      description: Samsung Soundbar device. Required only when multiple soundbars are loaded.
      required: false
      selector:
        device:
          integration: samsung_soundbar
    preset:
      name: Preset
      description: Known SmartThings execute href group to dump. Ignored when href is provided.
      required: false
      default: all
      selector:
        select:
          options:
            - all
            - q800f_ui
            - advancedaudio
            - spacefitSound
            - activeVoiceAmplifier
            - channelVolume
            - surroundspeaker
            - eq
            - soundmode
            - woofer
            - sync
            - virtual
            - moderateBass
            - soundGrouping
            - privateRear
    href:
      name: Href
      description: Custom execute href, for example /sec/networkaudio/advancedaudio.
      required: false
      example: /sec/networkaudio/advancedaudio
      selector:
        text:
    write_property:
      name: Write probe property
      description: Optional explicit write probe property. Requires href and write_value. This may change the soundbar setting.
      required: false
      example: x.com.samsung.networkaudio.spacefitSound
      selector:
        text:
    write_value:
      name: Write probe value
      description: Optional explicit write probe value. Used only with write_property and href. This may change the soundbar setting.
      required: false
      example: 1
      selector:
        object:

dump_status_summary:
  name: Dump status summary
  description: Return a compact SmartThings status capability summary for diagnostics.
  fields:
    device_id:
      name: Device
      description: Samsung Soundbar device. Required only when multiple soundbars are loaded.
      required: false
      selector:
        device:
          integration: samsung_soundbar
    include_null:
      name: Include null values
      description: Include capabilities and attributes whose value is null.
      required: false
      default: false
      selector:
        boolean:

dump_local_rpc:
  name: Dump local RPC
  description: Probe the soundbar local JSON-RPC API over LAN. Requires the soundbar IP address and IP Control enabled in SmartThings.
  fields:
    host:
      name: Host
      description: Soundbar IP address or hostname.
      required: true
      example: 192.168.1.50
      selector:
        text:
    port:
      name: Port
      description: Local JSON-RPC HTTPS port.
      required: false
      default: 1516
      selector:
        number:
          min: 1
          max: 65535
          step: 1
          mode: box
    verify_ssl:
      name: Verify SSL
      description: Verify the soundbar HTTPS certificate. Usually disabled because the soundbar uses a self-signed certificate.
      required: false
      default: false
      selector:
        boolean:
    timeout:
      name: Timeout
      description: Request timeout in seconds.
      required: false
      default: 8
      selector:
        number:
          min: 1
          max: 60
          step: 1
          mode: box
    methods:
      name: Methods
      description: Local JSON-RPC methods to call after createAccessToken succeeds.
      required: false
      default:
        - powerControl
        - getVolume
        - getMute
        - inputSelectControl
        - soundModeControl
        - getCodec
        - getIdentifier
      selector:
        select:
          multiple: true
          custom_value: true
          options:
            - powerControl
            - getVolume
            - getMute
            - inputSelectControl
            - soundModeControl
            - getCodec
            - getIdentifier
            - createAccessToken
    write_method:
      name: Write probe method
      description: Optional local JSON-RPC method to call with write_params after read methods. The service reads the same methods again after this call. This may change the soundbar setting.
      required: false
      example: inputSelectControl
      selector:
        text:
    write_params:
      name: Write probe params
      description: Optional JSON-RPC params for write_method. AccessToken is added automatically.
      required: false
      example:
        inputSource: WIFI_IDLE
      selector:
        object:
